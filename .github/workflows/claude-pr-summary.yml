name: Claude PR Summary

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude to summarize PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            このPRの変更内容を確認し、PRのdescriptionを日本語で更新してください。

            以下の形式で記述してください：

            ## 概要
            （変更の目的を1〜2文で）

            ## 主な変更点
            - （箇条書きで変更内容を列挙）

            ## テスト方法
            - （動作確認の手順）

            既存のdescriptionは上書きして構いません。
            コードの詳細には触れず、変更の意図と影響を中心に書いてください。
