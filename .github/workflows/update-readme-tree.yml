name: Update README Tree

on:
  push:
    branches:
      - main

jobs:
  update-tree:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tree
        run: sudo apt-get install -y tree

      - name: Generate directory tree
        run: |
          tree -I 'node_modules|.git|.expo|dist|build|coverage|.next|.turbo' \
               --dirsfirst -L 3 > /tmp/tree.txt

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Run Claude to update README
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 .github/scripts/update_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update README project structure [skip ci]"
            git push
          fi
